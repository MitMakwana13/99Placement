version: "3.8"

services:
  api:
    build:
      context: ../..
      dockerfile: artifacts/api-server/Dockerfile
      target: development
    container_name: rms_api_server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
      - DATABASE_URL=postgresql://gg_user:gg_dev_password@host.docker.internal:5432/placement?schema=public
      - JWT_SECRET=development_jwt_secret_must_change_in_production_12345
      - JWT_REFRESH_SECRET=development_jwt_refresh_secret_must_change_in_production_12345
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=debug
    volumes:
      - ../../:/app
      - /app/node_modules
      - /app/artifacts/api-server/node_modules
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

  redis:
    image: redis:7-alpine
    container_name: rms_cache_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
