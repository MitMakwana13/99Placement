version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: rms_postgres_local
    environment:
      POSTGRES_USER: gg_user
      POSTGRES_PASSWORD: gg_dev_password
      POSTGRES_DB: placement
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: rms_redis_local
    ports:
      - "6379:6379"
    volumes:
      - redis_data_local:/data
    restart: always

volumes:
  postgres_data_local:
  redis_data_local:
